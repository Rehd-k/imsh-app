name: imsh
description: "IMSH Patient Portal — hospital patient mobile and web app."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  # Core stack (aligned with helty)
  flutter_riverpod: ^2.5.1
  dio: ^5.4.3+1
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.5.4
  auto_route: ^11.1.0
  freezed_annotation: ^3.1.0
  json_annotation: ^4.12.0
  intl: ^0.20.2
  timezone: ^0.10.0
  gap: ^3.0.1
  google_fonts: ^8.0.2
  cupertino_icons: ^1.0.8

  # Patient MVP features
  qr_flutter: ^4.1.0
  flutter_local_notifications: ^20.1.0
  socket_io_client: ^3.0.2
  cached_network_image: ^3.4.1
  skeletonizer: ^2.1.0+1
  infinite_scroll_pagination: ^4.0.0
  table_calendar: ^3.1.3
  connectivity_plus: ^6.1.4
  package_info_plus: ^9.0.0
  url_launcher: ^6.3.1
  flutter_pdfview: ^1.4.4

  # Config
  envied: ^1.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.11.1
  auto_route_generator: ^10.5.0
  freezed: ^3.2.5
  json_serializable: ^6.13.0
  envied_generator: ^1.1.1
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
    - assets/imsh.png
    - assets/vessellogo.png

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/imsh.png"
  web:
    generate: true
    image_path: "assets/imsh.png"
